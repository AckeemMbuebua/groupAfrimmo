<section id="faq" class="scroll-mt-28 grid overflow-hidden bg-dark-cmt text-white lg:grid-cols-2">
  <div
    class="min-h-[180px] bg-[url('/images/projet/optimized/al-saad-apartments-08.webp')] bg-cover bg-center grayscale sm:min-h-[260px] lg:min-h-[420px]"
    aria-hidden="true"
  ></div>
  <div class="min-w-0 px-4 py-14 sm:px-8 sm:py-20 lg:px-16 lg:py-24">
    <div appReveal class="reveal-readable max-w-2xl">
      <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-brand-light">
        {{ home().faq.eyebrow }}
      </p>
      <h2
        class="text-balance text-3xl font-extrabold uppercase leading-tight tracking-tight sm:text-4xl md:text-5xl"
      >
        {{ home().faq.title }}
      </h2>
    </div>

    <div appReveal class="reveal-readable mt-8 space-y-3 sm:mt-10">
      @for (item of home().faq.items; track item.question; let i = $index) {
        <div class="faq-item overflow-hidden rounded-none border border-white/10">
          <button
            type="button"
            class="faq-trigger flex w-full items-center justify-between gap-4 px-4 py-4 text-left text-xs font-extrabold uppercase leading-snug tracking-wide sm:gap-5 sm:px-5 sm:py-5 sm:text-sm"
            [attr.aria-expanded]="openIndex() === i"
            [attr.aria-controls]="'faq-panel-' + i"
            (click)="toggle(i)"
          >
            <span class="min-w-0 flex-1 break-words">{{ item.question }}</span>
            <i
              class="fa-solid shrink-0 text-brand-light"
              [ngClass]="openIndex() === i ? 'fa-minus' : 'fa-plus'"
            ></i>
          </button>
          <div
            [id]="'faq-panel-' + i"
            class="faq-content px-4 pb-4 text-sm leading-7 text-white/60 sm:px-5 sm:pb-5"
            [class.hidden]="openIndex() !== i"
          >
            {{ item.answer }}
          </div>
        </div>
      }
    </div>
  </div>
</section>
