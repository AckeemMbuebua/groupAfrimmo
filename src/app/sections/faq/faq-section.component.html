<section id="faq" class="scroll-mt-28 grid bg-dark-cmt text-white lg:grid-cols-2">
  <div
    class="min-h-[420px] bg-[url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1400&auto=format&fit=crop')] bg-cover bg-center grayscale"
    aria-hidden="true"
  ></div>
  <div class="px-4 py-20 sm:px-8 lg:px-16 lg:py-24">
    <div appReveal class="max-w-2xl">
      <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-brand-light">
        Questions fréquentes
      </p>
      <h2 class="text-4xl font-extrabold uppercase leading-tight sm:text-5xl">
        Besoin d'éclaircissements ?
      </h2>
    </div>

    <div appReveal class="mt-10 space-y-3">
      @for (item of items; track item.question; let i = $index) {
        <div class="faq-item border border-white/10">
          <button
            type="button"
            class="faq-trigger flex w-full items-center justify-between gap-5 px-5 py-5 text-left text-sm font-extrabold uppercase tracking-wide"
            [attr.aria-expanded]="openIndex() === i"
            [attr.aria-controls]="'faq-panel-' + i"
            (click)="toggle(i)"
          >
            {{ item.question }}
            <i
              class="fa-solid text-brand-light"
              [ngClass]="openIndex() === i ? 'fa-minus' : 'fa-plus'"
            ></i>
          </button>
          <div
            [id]="'faq-panel-' + i"
            class="faq-content px-5 pb-5 text-sm leading-7 text-white/60"
            [class.hidden]="openIndex() !== i"
          >
            {{ item.answer }}
          </div>
        </div>
      }
    </div>
  </div>
</section>
