<section
  id="contact"
  class="scroll-mt-28 relative overflow-hidden border-t border-dark-cmt/10 bg-surface px-4 py-16 sm:px-6 sm:py-20 lg:px-8 lg:py-28"
>
  <div class="absolute inset-y-0 right-0 hidden w-1/3 bg-brand lg:block"></div>
  <div class="relative mx-auto grid w-full max-w-7xl min-w-0 gap-8 lg:grid-cols-[.9fr_1.1fr] lg:items-center lg:gap-10">
    <div appReveal class="reveal-readable min-w-0">
      <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-brand">{{ home().contact.eyebrow }}</p>
      <h2
        class="text-balance text-3xl font-extrabold uppercase leading-tight tracking-tight sm:text-4xl md:text-5xl"
      >
        {{ home().contact.title }}
      </h2>
      <p class="mt-6 max-w-xl text-sm font-light leading-relaxed text-steel">
        {{ home().contact.lead }}
      </p>
      <div class="mt-8 grid min-w-0 gap-4 text-sm font-bold">
        <a [href]="phoneHref" class="flex min-w-0 items-center gap-4">
          <span class="grid h-11 w-11 shrink-0 place-items-center rounded-none bg-dark-cmt text-white sm:h-12 sm:w-12"
            ><i class="fa-solid fa-phone"></i></span>
          <span class="min-w-0 break-words">
            <span class="block text-xs font-extrabold uppercase tracking-wider text-dark-cmt/50">{{
              home().cta.call
            }}</span>
            {{ phoneDisplay }}
          </span>
        </a>
        <a
          [href]="whatsappHref"
          class="flex min-w-0 items-center gap-4"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="home().contact.whatsappAria"
        >
          <span class="grid h-11 w-11 shrink-0 place-items-center rounded-none bg-green-600 text-white sm:h-12 sm:w-12"
            ><i class="fa-brands fa-whatsapp"></i></span>
          <span class="min-w-0 break-words">{{ home().cta.whatsapp }}</span>
        </a>
        <a [href]="mailHref" class="flex min-w-0 items-center gap-4">
          <span class="grid h-11 w-11 shrink-0 place-items-center rounded-none bg-dark-cmt text-white sm:h-12 sm:w-12"
            ><i class="fa-solid fa-envelope"></i></span>
          <span class="min-w-0 break-all">{{ mailDisplay }}</span>
        </a>
        <span class="flex min-w-0 items-center gap-4">
          <span class="grid h-11 w-11 shrink-0 place-items-center rounded-none bg-dark-cmt text-white sm:h-12 sm:w-12">
            <i class="fa-solid fa-location-dot"></i>
          </span>
          <span class="min-w-0 break-words">{{ site().shared.contact.locationLabel }}</span>
        </span>
      </div>
    </div>

    <form
      appReveal
      class="reveal-readable w-full max-w-full min-w-0 overflow-hidden rounded-none border border-white/15 bg-dark-cmt p-4 text-white sm:p-6 md:p-8 lg:p-10"
      novalidate
      (submit)="submitByEmail($event)"
    >
      <div class="grid w-full min-w-0 grid-cols-1 gap-4 md:grid-cols-2">
        <label class="grid min-w-0 gap-2 text-[10px] font-extrabold uppercase tracking-widest text-white/50">
          {{ home().contact.form.nameLabel }}
          <input
            type="text"
            name="name"
            autocomplete="name"
            required
            class="box-border w-full max-w-full min-w-0 rounded-none border border-white/10 bg-white/[.06] px-4 py-4 text-sm text-white outline-none transition focus:border-brand"
            [placeholder]="home().contact.form.namePlaceholder"
          />
        </label>
        <label class="grid min-w-0 gap-2 text-[10px] font-extrabold uppercase tracking-widest text-white/50">
          {{ home().contact.form.phoneLabel }}
          <input
            type="tel"
            name="phone"
            autocomplete="tel"
            required
            pattern="^\\+?[0-9\\s()-]{7,}$"
            class="box-border w-full max-w-full min-w-0 rounded-none border border-white/10 bg-white/[.06] px-4 py-4 text-sm text-white outline-none transition focus:border-brand"
            [placeholder]="home().contact.form.phonePlaceholder"
          />
        </label>
        <label
          class="grid min-w-0 gap-2 text-[10px] font-extrabold uppercase tracking-widest text-white/50 md:col-span-2"
        >
          {{ home().contact.form.emailLabel }}
          <input
            type="email"
            name="email"
            autocomplete="email"
            inputmode="email"
            class="box-border w-full max-w-full min-w-0 rounded-none border border-white/10 bg-white/[.06] px-4 py-4 text-sm text-white outline-none transition focus:border-brand"
            [placeholder]="home().contact.form.emailPlaceholder"
          />
        </label>
        <label
          class="grid min-w-0 gap-2 text-[10px] font-extrabold uppercase tracking-widest text-white/50 md:col-span-2"
        >
          {{ home().contact.form.projectTypeLabel }}
          <select
            name="projectType"
            required
            class="box-border w-full max-w-full min-w-0 appearance-none rounded-none border border-white/10 bg-white/[.06] px-4 py-4 text-sm text-white outline-none transition focus:border-brand"
          >
            @for (opt of home().contact.form.projectOptions; track opt.value) {
              <option class="text-dark-cmt" [value]="opt.label">{{ opt.label }}</option>
            }
          </select>
        </label>
        <label
          class="grid min-w-0 gap-2 text-[10px] font-extrabold uppercase tracking-widest text-white/50 md:col-span-2"
        >
          {{ home().contact.form.messageLabel }}
          <textarea
            name="message"
            rows="5"
            required
            minlength="20"
            class="box-border w-full max-w-full min-w-0 resize-none rounded-none border border-white/10 bg-white/[.06] px-4 py-4 text-sm text-white outline-none transition focus:border-brand"
            [placeholder]="home().contact.form.messagePlaceholder"
          ></textarea>
        </label>
      </div>
      <p
        id="contact-form-note"
        class="mt-4 text-[11px] font-light leading-relaxed text-white/55"
      >
        {{ home().contact.form.submitNote }}
      </p>
      <button
        type="submit"
        class="mt-4 inline-flex min-h-[56px] w-full max-w-full min-w-0 items-center justify-center gap-3 rounded-none bg-brand px-5 py-4 text-xs font-extrabold uppercase tracking-widest text-white transition-colors duration-300 hover:bg-brand-dark sm:px-6"
        aria-describedby="contact-form-note"
      >
        {{ home().cta.formSubmit }}
        <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
      </button>
    </form>
  </div>
</section>
