<section
  id="contact"
  class="scroll-mt-28 relative overflow-hidden border-t border-dark-cmt/10 bg-surface px-4 py-14 sm:px-6 sm:py-20 lg:px-8 lg:py-28"
>
  <div class="absolute inset-y-0 right-0 hidden w-1/3 bg-brand lg:block"></div>
  <div class="relative mx-auto grid w-full max-w-7xl min-w-0 gap-8 lg:grid-cols-[.9fr_1.1fr] lg:items-center lg:gap-10">
    <div appReveal class="min-w-0">
      <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-brand">Contact</p>
      <h2
        class="text-balance text-3xl font-extrabold uppercase leading-tight tracking-tight sm:text-5xl lg:text-6xl"
      >
        Parlons de votre projet.
      </h2>
      <p class="mt-6 max-w-xl text-sm leading-7 text-steel">
        Construction, génie civil, logistique, import-export ou appui technique : envoyez les
        premières informations et notre équipe revient avec un cadrage clair.
      </p>
      <div class="mt-8 grid min-w-0 gap-4 text-sm font-bold">
        <a [href]="phoneHref" class="flex min-w-0 items-center gap-4">
          <span class="grid h-11 w-11 shrink-0 place-items-center bg-dark-cmt text-white sm:h-12 sm:w-12"
            ><i class="fa-solid fa-phone"></i></span>
          <span class="min-w-0 break-words">
            <span class="block text-xs font-extrabold uppercase tracking-wider text-dark-cmt/50">{{
              cta.call
            }}</span>
            {{ phoneDisplay }}
          </span>
        </a>
        <a
          [href]="whatsappHref"
          class="flex min-w-0 items-center gap-4"
          target="_blank"
          rel="noopener"
          aria-label="Écrire sur WhatsApp — Groupe Afrimmo S.A."
        >
          <span class="grid h-11 w-11 shrink-0 place-items-center bg-green-600 text-white sm:h-12 sm:w-12"
            ><i class="fa-brands fa-whatsapp"></i></span>
          <span class="min-w-0 break-words">{{ cta.whatsapp }}</span>
        </a>
        <a [href]="mailHref" class="flex min-w-0 items-center gap-4">
          <span class="grid h-11 w-11 shrink-0 place-items-center bg-dark-cmt text-white sm:h-12 sm:w-12"
            ><i class="fa-solid fa-envelope"></i></span>
          <span class="min-w-0 break-all">{{ mailDisplay }}</span>
        </a>
        <span class="flex min-w-0 items-center gap-4">
          <span class="grid h-11 w-11 shrink-0 place-items-center bg-dark-cmt text-white sm:h-12 sm:w-12">
            <i class="fa-solid fa-location-dot"></i>
          </span>
          <span class="min-w-0 break-words">RDC & International</span>
        </span>
      </div>
    </div>

    <form
      appReveal
      class="w-full max-w-full min-w-0 overflow-hidden border border-white/15 bg-dark-cmt p-4 text-white sm:p-6 md:p-8 lg:p-10"
      [attr.action]="mailHref"
      method="post"
      enctype="text/plain"
    >
      <div class="grid w-full min-w-0 grid-cols-1 gap-4 md:grid-cols-2">
        <label class="grid min-w-0 gap-2 text-[10px] font-extrabold uppercase tracking-widest text-white/50">
          Nom complet
          <input
            type="text"
            name="name"
            autocomplete="name"
            class="box-border w-full max-w-full min-w-0 border border-white/10 bg-white/[.06] px-4 py-4 text-sm text-white outline-none transition focus:border-brand"
            placeholder="Nom et prénom"
          />
        </label>
        <label class="grid min-w-0 gap-2 text-[10px] font-extrabold uppercase tracking-widest text-white/50">
          Téléphone
          <input
            type="tel"
            name="phone"
            autocomplete="tel"
            class="box-border w-full max-w-full min-w-0 border border-white/10 bg-white/[.06] px-4 py-4 text-sm text-white outline-none transition focus:border-brand"
            placeholder="+243 ..."
          />
        </label>
        <label
          class="grid min-w-0 gap-2 text-[10px] font-extrabold uppercase tracking-widest text-white/50 md:col-span-2"
        >
          Type de projet
          <select
            name="projectType"
            class="box-border w-full max-w-full min-w-0 appearance-none border border-white/10 bg-white/[.06] px-4 py-4 text-sm text-white outline-none transition focus:border-brand"
          >
            @for (opt of projectOptions; track opt.value) {
              <option class="text-dark-cmt" [value]="opt.label">{{ opt.label }}</option>
            }
          </select>
        </label>
        <label
          class="grid min-w-0 gap-2 text-[10px] font-extrabold uppercase tracking-widest text-white/50 md:col-span-2"
        >
          Message
          <textarea
            name="message"
            rows="5"
            class="box-border w-full max-w-full min-w-0 resize-none border border-white/10 bg-white/[.06] px-4 py-4 text-sm text-white outline-none transition focus:border-brand"
            placeholder="Localisation, délais, budget indicatif, besoin principal..."
          ></textarea>
        </label>
      </div>
      <button
        type="button"
        class="mt-5 inline-flex w-full max-w-full min-w-0 items-center justify-center gap-3 bg-brand px-5 py-4 text-xs font-extrabold uppercase tracking-widest text-white transition hover:bg-brand-dark sm:px-6"
        (click)="submitByEmail($event)"
      >
        {{ cta.formSubmit }}
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </form>
  </div>
</section>
