<section
  class="relative scroll-mt-28 border-t border-white/10 bg-dark-cmt px-4 py-12 text-white sm:px-6 lg:px-8 lg:py-16"
  aria-label="Indicateurs"
>
  <div class="mx-auto grid max-w-7xl grid-cols-2 gap-3 sm:grid-cols-2 sm:gap-4 lg:grid-cols-4 lg:gap-5">
    @for (stat of stats; track stat.label; let idx = $index) {
      <div
        appReveal
        class="border border-white/15 bg-black/25 p-5 sm:p-7"
        [style.transition-delay.s]="stat.transitionDelaySeconds ?? undefined"
      >
        <span
          appCounter
          [target]="stat.target"
          [suffix]="stat.suffix"
          class="block text-3xl font-black tabular-nums tracking-tight text-white sm:text-4xl lg:text-[2.75rem]"
        ></span>
        <span
          class="mt-3 block text-[10px] font-bold uppercase tracking-[0.22em] text-red-cmt"
          >{{ stat.label }}</span
        >
      </div>
    }
  </div>
</section>
