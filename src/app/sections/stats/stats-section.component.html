<section
  aria-label="Indicateurs"
  class="relative z-20 -mt-8 scroll-mt-28 bg-surface px-4 pb-16 pt-0 text-dark-cmt sm:-mt-10 sm:px-6 sm:pb-20 lg:-mt-14 lg:px-8 lg:pb-24"
>
  <div class="mx-auto max-w-7xl">
    <div
      class="grid grid-cols-1 gap-3 border border-dark-cmt/10 bg-white p-3 shadow-[0_24px_70px_rgb(10_10_10_/_0.10)] sm:grid-cols-2 sm:gap-4 sm:p-4 lg:grid-cols-4 lg:gap-0 lg:p-0"
    >
      @for (stat of stats; track stat.label) {
        <div
          appReveal
          class="group border border-dark-cmt/10 bg-white p-5 transition-colors duration-300 hover:border-brand/30 sm:p-6 lg:border-y-0 lg:border-l-0 lg:border-r lg:p-7 lg:last:border-r-0"
          [style.transition-delay.s]="stat.transitionDelaySeconds ?? undefined"
        >
          <span
            class="mb-4 block h-0.5 w-8 bg-brand transition-[width] duration-300 group-hover:w-11"
            aria-hidden="true"
          ></span>
          <p
            class="font-black tabular-nums leading-none tracking-tight text-dark-cmt text-[clamp(2.45rem,8vw,3.25rem)] sm:text-[clamp(2.65rem,5vw,3.15rem)] lg:text-[2.95rem]"
          >
            {{ stat.valuePrefix }}{{ stat.value }}
          </p>
          <p
            class="mt-4 text-[10px] font-extrabold uppercase leading-snug tracking-[0.2em] text-dark-cmt/75 sm:text-[11px]"
          >
            {{ stat.label }}
          </p>
          <!-- <p class="mt-2.5 max-w-[20rem] text-[11px] font-light leading-relaxed text-dark-cmt/45 sm:text-xs">
            {{ stat.sublabel }}
          </p> -->
        </div>
      }
    </div>

    <div
      appReveal
      class="mt-7 border-t border-dark-cmt/10 pt-6 lg:mt-9 lg:pt-7"
      role="presentation"
    >
      <div
        class="flex flex-wrap items-center justify-center gap-x-2 gap-y-2 sm:gap-x-3"
      >
        @for (cap of capabilityLabels; track cap; let i = $index) {
          @if (i > 0) {
            <span
              class="hidden h-3 w-px shrink-0 bg-dark-cmt/20 sm:block"
              aria-hidden="true"
            ></span>
          }
          <span
            class="max-w-[11rem] text-center text-[9px] font-semibold uppercase leading-snug tracking-[0.18em] text-dark-cmt/42 sm:max-w-none sm:text-[10px]"
            >{{ cap }}</span
          >
        }
      </div>
    </div>
  </div>
</section>
