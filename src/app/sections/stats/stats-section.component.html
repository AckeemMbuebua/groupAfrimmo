<section
  aria-label="Indicateurs"
  class="relative z-20 -mt-8 scroll-mt-28 border-t border-white/10 bg-dark-cmt px-4 pb-14 pt-3 text-white sm:-mt-12 sm:px-6 sm:pb-16 sm:pt-4 lg:-mt-[4.25rem] lg:px-8 lg:pb-20 xl:-mt-20"
>
  <div class="mx-auto max-w-7xl">
    <div
      class="grid grid-cols-1 gap-3 sm:grid-cols-2 sm:gap-4 lg:grid-cols-4 lg:gap-5"
    >
      @for (stat of stats; track stat.label) {
        <div
          appReveal
          class="group border border-white/10 bg-black/35 p-6 transition-colors duration-300 hover:border-white/20 sm:p-7 lg:p-8"
          [style.transition-delay.s]="stat.transitionDelaySeconds ?? undefined"
        >
          <span
            class="mb-4 block h-0.5 w-9 bg-brand transition-[width] duration-300 group-hover:w-11"
            aria-hidden="true"
          ></span>
          <p
            class="font-black tabular-nums leading-none tracking-tight text-white text-[clamp(2.5rem,8vw,3.35rem)] sm:text-[clamp(2.75rem,5vw,3.25rem)] lg:text-[3rem]"
          >
            {{ stat.valuePrefix }}{{ stat.value }}
          </p>
          <p
            class="mt-4 text-[10px] font-bold uppercase leading-snug tracking-[0.22em] text-white/90 sm:text-[11px]"
          >
            {{ stat.label }}
          </p>
          <!-- <p class="mt-2.5 max-w-[20rem] text-[11px] font-light leading-relaxed text-white/45 sm:text-xs">
            {{ stat.sublabel }}
          </p> -->
        </div>
      }
    </div>

    <div
      appReveal
      class="mt-8 border-t border-white/10 pt-7 lg:mt-10 lg:pt-8"
      role="presentation"
    >
      <div
        class="flex flex-wrap items-center justify-center gap-x-2 gap-y-2 sm:gap-x-2.5"
      >
        @for (cap of capabilityLabels; track cap; let i = $index) {
          @if (i > 0) {
            <span
              class="hidden h-3 w-px shrink-0 bg-white/25 sm:block"
              aria-hidden="true"
            ></span>
          }
          <span
            class="max-w-[11rem] text-center text-[9px] font-semibold uppercase leading-snug tracking-[0.2em] text-white/40 sm:max-w-none sm:text-[10px]"
            >{{ cap }}</span
          >
        }
      </div>
    </div>
  </div>
</section>
