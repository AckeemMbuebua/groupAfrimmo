<section class="bg-dark-cmt px-4 pb-16 text-white sm:px-6 lg:px-8">
  <div class="mx-auto grid max-w-7xl grid-cols-2 gap-3 sm:gap-5 lg:grid-cols-4">
    @for (stat of stats; track stat.label; let idx = $index) {
      <div
        appReveal
        class="border border-white/10 bg-white/[.04] p-5 sm:p-8"
        [style.transition-delay.s]="stat.transitionDelaySeconds ?? undefined"
      >
        <span
          appCounter
          [target]="stat.target"
          [suffix]="stat.suffix"
          class="block text-4xl font-extrabold italic sm:text-5xl"
        ></span>
        <span
          class="mt-3 block text-[10px] font-extrabold uppercase tracking-widest text-red-cmt"
          >{{ stat.label }}</span
        >
      </div>
    }
  </div>
</section>
