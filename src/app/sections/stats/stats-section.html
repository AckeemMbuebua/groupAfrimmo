<section
  aria-labelledby="stats-heading"
  class="relative z-20 -mt-8 scroll-mt-28 sm:-mt-10 lg:-mt-12 mb-10 lg:mb-20 xl:-mt-14"
>
  <!-- Bande brand : mêmes codes typo que « Expertises » / « Références » (surtitre + filet) -->
  <div
    class="bg-brand px-4 pb-24 pt-14 text-center text-white sm:px-6 sm:pb-28 sm:pt-16 lg:px-8 lg:pb-32 lg:pt-20 xl:pb-36"
  >
    <div class="mx-auto max-w-7xl">
      <div appReveal class="mx-auto flex max-w-3xl flex-col items-center text-center reveal-scale">
        <span
          class="mb-4 block h-0.5 w-10 bg-brand-light/90"
          aria-hidden="true"
        ></span>
        <p
          class="text-xs font-extrabold uppercase tracking-[0.24em] text-brand-light sm:tracking-[.28em]"
        >
          Indicateurs
        </p>
        <h2
          id="stats-heading"
          class="mt-4 text-balance text-3xl font-extrabold uppercase leading-tight tracking-tight text-white md:text-4xl lg:text-[2.65rem]"
        >
          {{ sectionTitle }}
        </h2>
        <p
          class="mx-auto mt-5 max-w-2xl text-sm font-light leading-relaxed text-white/85 md:text-base md:leading-8"
        >
          {{ sectionLead }}
        </p>
      </div>
    </div>
  </div>

  <!-- Cartes : même vocabulaire que expertise / références (bordure fine, magnetic-card, pas d’ombre « carte bancaire ») -->
  <div class="relative mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div
      class="-mt-16 grid grid-cols-1 gap-5 sm:-mt-20 sm:grid-cols-2 lg:-mt-24 lg:grid-cols-4 lg:gap-5 xl:-mt-28"
    >
      @for (stat of stats; track stat.label) {
        <div
          appReveal
          class="group h-full border border-gray-200 bg-white p-6 text-left shadow-none transition-colors duration-300 sm:p-7 magnetic-card"
          [style.transition-delay.s]="stat.transitionDelaySeconds ?? undefined"
        >
          <span
            class="mb-5 block h-0.5 w-8 bg-brand/85 transition-[width] duration-300 group-hover:w-12"
            aria-hidden="true"
          ></span>
          <p
            class="stat-number font-black tabular-nums leading-none tracking-tight text-dark-cmt text-[clamp(2.25rem,6.5vw,3rem)] sm:text-[clamp(2.5rem,4vw,2.85rem)] lg:text-[2.75rem]"
          >
            {{ stat.valuePrefix }}{{ stat.value }}
          </p>
          <p
            class="mt-4 text-[10px] font-bold uppercase leading-snug tracking-[0.2em] text-dark-cmt sm:text-[11px]"
          >
            {{ stat.label }}
          </p>
          <p class="mt-3 text-[11px] font-light leading-relaxed text-steel sm:text-xs">
            {{ stat.sublabel }}
          </p>
        </div>
      }
    </div>
  </div>
