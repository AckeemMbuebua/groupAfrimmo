<section
  id="home"
  class="scroll-mt-28 noise relative isolate grid min-h-0 overflow-hidden bg-dark-cmt pt-24 text-white sm:pt-28"
>
  <div class="col-start-1 row-start-1 min-h-[min(46svh,460px)] w-full sm:min-h-[min(42svh,420px)]">
    <!-- Image de fond : visible tout de suite et si la vidéo ne charge pas -->
    <div
      class="pointer-events-none absolute inset-0 bg-cover bg-center bg-no-repeat"
      [style.background-image]="'url(' + posterSrc + ')'"
      aria-hidden="true"
    ></div>
    <div class="pointer-events-none absolute inset-0">
      <video
        autoplay
        muted
        loop
        playsinline
        preload="metadata"
        [poster]="posterSrc"
        class="h-full w-full scale-[1.03] object-cover"
      >
        <source [src]="videoSrc" type="video/mp4" />
      </video>
    </div>
    <div
      class="pointer-events-none absolute inset-0 bg-gradient-to-b from-black/45 via-black/72 to-black/88"
      aria-hidden="true"
    ></div>
  </div>

  <div
    class="relative z-10 col-start-1 row-start-1 mx-auto flex w-full max-w-4xl flex-col justify-center self-start px-4 pb-10 pt-6 sm:px-6 sm:pb-12 sm:pt-10 lg:max-w-5xl lg:pb-14 lg:pt-12"
  >
    <div
      class="flex w-full flex-col items-start border border-white/15 bg-black/35 px-6 py-7 text-left sm:px-8 sm:py-8"
    >
      <div class="hero-echo-chip mb-5 flex items-center gap-3">
        <span class="h-px w-10 shrink-0 bg-red-cmt" aria-hidden="true"></span>
        <span class="text-[10px] font-bold uppercase tracking-[0.28em] text-red-cmt sm:text-[11px]">
          Construction · logistique · industrie
        </span>
      </div>

      <div class="hero-echo-heading">
        <h1
          class="text-balance text-[clamp(1.75rem,4.5vw,2.65rem)] font-extrabold uppercase leading-[1.06] tracking-tight text-white sm:text-[clamp(2rem,4vw,3rem)] md:text-[clamp(2.25rem,3.5vw,3.25rem)]"
        >
          Bâtir le futur
          <span class="mt-2 block text-outline md:mt-1.5">
            avec maîtrise.
          </span>
        </h1>
      </div>

      <p
        class="hero-echo-copy mb-6 mt-5 max-w-xl text-sm leading-relaxed text-white/75 sm:max-w-2xl sm:text-[0.9375rem]"
      >
        Groupe Afrimmo S.A. structure des programmes exigeants en génie civil, logistique
        industrielle et exécution projet — RDC, Afrique centrale &amp;&nbsp;Est, missions
        internationales sur demande.
      </p>

      <div class="hero-echo-cta flex w-full flex-col gap-3 sm:flex-row sm:gap-4">
        <a
          routerLink="/"
          fragment="contact"
          class="inline-flex h-11 min-h-[44px] flex-1 items-center justify-center gap-2 bg-red-cmt px-7 text-[11px] font-semibold uppercase tracking-[0.14em] text-white transition hover:bg-white hover:text-dark-cmt sm:h-12 sm:flex-initial sm:px-8 sm:text-[12px]"
        >
          Démarrer un projet
          <svg lucideArrowRight class="size-4" [strokeWidth]="2"></svg>
        </a>
        <a
          routerLink="/realisations"
          class="inline-flex h-11 min-h-[44px] flex-1 items-center justify-center border border-white/45 bg-transparent px-7 text-[11px] font-semibold uppercase tracking-[0.14em] text-white transition hover:border-white hover:bg-white/10 sm:h-12 sm:flex-initial sm:px-8 sm:text-[12px]"
        >
          Nos réalisations
        </a>
      </div>
    </div>
  </div>
</section>
