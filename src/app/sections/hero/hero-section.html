<section
  id="home"
  class="relative isolate flex min-h-[100svh] flex-col overflow-hidden bg-black pt-[5.25rem] pb-10 text-white scroll-mt-24 sm:pt-[5.5rem] sm:pb-12"
>
  <div class="pointer-events-none absolute inset-0 min-h-[100svh]" aria-hidden="true">
    <div class="absolute inset-0 overflow-hidden">
      <img
        [src]="heroImageSrc"
        sizes="100vw"
        alt=""
        width="2560"
        height="1440"
        decoding="async"
        fetchpriority="high"
        class="hero-bg-image h-full min-h-[100svh] w-full object-cover object-center"
      />
    </div>
    <div
      class="absolute inset-0 bg-linear-to-b from-black/28 via-black/42 to-black/62"
    ></div>
    <div
      class="absolute inset-0 bg-[radial-gradient(ellipse_80%_50%_at_50%_-10%,rgba(30,83,137,0.14),transparent_58%)]"
    ></div>
  </div>

  <div
    class="noise pointer-events-none absolute inset-0 z-[1] opacity-[0.08]"
    aria-hidden="true"
  ></div>

  <div
    class="relative z-10 mx-auto flex w-full max-w-4xl flex-1 flex-col justify-center px-4 py-14 text-center sm:max-w-5xl sm:px-6 sm:py-16 md:py-20 lg:max-w-5xl"
  >
    <div
      class="hero-echo-chip mx-auto mb-6 inline-flex max-w-full flex-wrap items-center justify-center gap-x-1.5 gap-y-1 rounded-none border border-white/10 bg-white/[0.05] px-3.5 py-2 backdrop-blur-sm sm:mb-7 sm:px-4"
    >
      <span class="size-1 shrink-0 rounded-none bg-brand/90" aria-hidden="true"></span>
      <span
        class="text-center text-[10px] font-medium uppercase leading-snug tracking-[0.13em] text-white/62 sm:text-[11px] sm:tracking-[0.15em]"
      >
        {{ home().hero.chip }}
      </span>
    </div>

    <div class="hero-echo-heading mx-auto w-full max-w-4xl lg:max-w-5xl">
      <h1
        class="text-pretty text-4xl font-bold leading-[1.12] tracking-tight text-white sm:text-5xl sm:leading-[1.1] md:text-6xl lg:text-7xl"
      >
        {{ home().hero.title }}
        <span
          class="mt-2 block text-2xl font-semibold leading-tight text-white/88 sm:text-3xl md:text-4xl lg:text-5xl"
          >{{ home().hero.titleAccent }}</span
        >
      </h1>
    </div>

    <p
      class="hero-echo-copy mx-auto mt-6 max-w-2xl text-pretty text-base font-light leading-relaxed text-white/75 sm:mt-7 sm:text-lg sm:leading-8"
    >
      {{ home().hero.lead }}
    </p>

    <div
      class="hero-echo-cta mx-auto mt-9 flex w-full max-w-md flex-col items-center justify-center gap-3 sm:mt-10 sm:max-w-none sm:flex-row sm:gap-4"
    >
      <a
        routerLink="/"
        fragment="contact"
        class="inline-flex h-12 min-h-[48px] w-full items-center justify-center gap-2 rounded-none bg-brand px-7 text-sm font-semibold text-white shadow-md shadow-black/20 transition-colors duration-300 hover:bg-brand-dark sm:min-h-[52px] sm:w-auto sm:min-w-[11.5rem] sm:px-8"
      >
        {{ home().cta.primary }}
        <i class="fa-solid fa-arrow-right text-xs" aria-hidden="true"></i>
      </a>
      <a
        routerLink="/realisations"
        class="inline-flex h-12 min-h-[48px] w-full items-center justify-center rounded-none border border-white/20 bg-white/[0.04] px-7 text-sm font-semibold text-white transition-colors duration-300 hover:border-white/40 hover:bg-white/[0.08] sm:min-h-[52px] sm:w-auto sm:min-w-[11.5rem] sm:px-8"
      >
        {{ home().cta.secondary }}
      </a>
    </div>
  </div>
</section>
