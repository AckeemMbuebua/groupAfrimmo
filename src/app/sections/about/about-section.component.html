<section
  id="a-propos"
  class="scroll-mt-28 border-t border-gray-200 bg-gradient-to-b from-gray-50 via-white to-white px-4 py-20 sm:px-6 lg:px-8 lg:py-24"
>
  <div class="mx-auto max-w-7xl lg:grid lg:grid-cols-12 lg:gap-x-14 lg:gap-y-12">
    <header appReveal class="lg:col-span-5 lg:border-l-4 lg:border-red-cmt lg:pl-8">
      <p class="mb-5 text-xs font-extrabold uppercase tracking-[.28em] text-red-cmt">
        À propos
      </p>
      <h2
        class="text-balance text-[clamp(1.875rem,4.5vw,3.25rem)] font-extrabold uppercase leading-[1.1] tracking-tight text-dark-cmt"
      >
        Une entreprise industrielle résolument tournée vers l’impact terrain.
      </h2>
    </header>

    <div appReveal class="mt-14 space-y-8 lg:col-span-7 lg:mt-0">
      <p class="border-l-[3px] border-red-cmt/85 pl-6 text-xl font-semibold leading-snug tracking-tight text-dark-cmt sm:text-[1.35rem] sm:leading-relaxed">
        {{ leadParagraph }}
      </p>

      <ul class="space-y-5 text-base leading-8 text-steel">
        @for (line of bullets; track line) {
          <li class="flex gap-4">
            <span
              class="mt-1.5 grid h-6 w-6 shrink-0 place-items-center rounded-full bg-red-cmt text-[10px] text-white"
              aria-hidden="true"
            >
              <i class="fa-solid fa-check"></i>
            </span>
            <span>{{ line }}</span>
          </li>
        }
      </ul>

      <div
        class="flex flex-wrap items-center gap-4 border-t border-gray-200 pt-8 text-[11px] font-extrabold uppercase tracking-[0.2em] text-dark-cmt/45"
      >
        <span class="text-red-cmt">RDC</span>
        <span class="h-1 w-1 rounded-full bg-dark-cmt/25" aria-hidden="true"></span>
        <span>Afrique centrale & est</span>
        <span class="h-1 w-1 rounded-full bg-dark-cmt/25" aria-hidden="true"></span>
        <span>Missions internationales</span>
      </div>
    </div>
  </div>
</section>
