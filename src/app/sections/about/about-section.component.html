<section
  id="a-propos"
  class="relative scroll-mt-28 border-t border-gray-200 bg-white px-4 py-20 sm:px-6 lg:px-8 lg:py-24"
>
  <div class="relative mx-auto max-w-7xl lg:grid lg:grid-cols-12 lg:gap-x-12 lg:gap-y-10">
    <header appReveal class="lg:col-span-5">
      <div class="border border-gray-200 bg-white p-8 lg:border-l-4 lg:border-l-red-cmt lg:p-10">
        <p class="mb-4 text-xs font-extrabold uppercase tracking-[.28em] text-red-cmt">
          À propos
        </p>
        <h2
          class="text-balance text-[clamp(1.75rem,4vw,2.75rem)] font-extrabold uppercase leading-[1.12] tracking-tight text-dark-cmt"
        >
          Industrialiser l’exécution, du premier jet au dernier geste terrain.
        </h2>
        <p class="mt-6 text-sm font-semibold uppercase tracking-[0.18em] text-dark-cmt/55">
          Groupe Afrimmo S.A.
        </p>
      </div>
    </header>

    <div appReveal class="mt-12 space-y-8 lg:col-span-7 lg:mt-0">
      <div class="border border-gray-200 bg-gray-50 p-7 sm:p-9">
        <p class="text-lg font-light leading-relaxed text-dark-cmt sm:text-xl">
          {{ leadParagraph }}
        </p>
      </div>

      <ul class="space-y-5 text-base font-light leading-relaxed text-dark-cmt/80">
        @for (line of bullets; track line) {
          <li class="flex gap-4 border border-gray-200 bg-white p-4 sm:p-5">
            <span
              class="mt-0.5 grid h-8 w-8 shrink-0 place-items-center bg-red-cmt text-[11px] text-white"
              aria-hidden="true"
            >
              <i class="fa-solid fa-check"></i>
            </span>
            <span class="pt-0.5">{{ line }}</span>
          </li>
        }
      </ul>

      <div
        class="flex flex-wrap items-center gap-x-5 gap-y-2 border border-gray-200 bg-white px-5 py-4 text-[11px] font-extrabold uppercase tracking-[0.2em] text-dark-cmt/55"
      >
        <span class="text-red-cmt">RDC</span>
        <span class="hidden h-4 w-px bg-gray-200 sm:block" aria-hidden="true"></span>
        <span>Afrique centrale &amp; Est</span>
        <span class="hidden h-4 w-px bg-gray-200 sm:block" aria-hidden="true"></span>
        <span>Missions internationales</span>
      </div>
    </div>
  </div>
</section>
