<section id="a-propos" class="border-b border-gray-100 bg-white px-4 py-16 sm:px-6 lg:px-8 lg:py-20">
  <div appReveal class="mx-auto max-w-4xl text-center">
    <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-red-cmt">
      À propos
    </p>
    <h2
      class="text-balance text-3xl font-extrabold uppercase leading-tight tracking-tight sm:text-4xl lg:text-5xl"
    >
      Groupe Afrimmo S.A.
    </h2>
    <p class="mx-auto mt-8 max-w-3xl text-base leading-8 text-steel sm:text-lg">
      {{ leadParagraph }}
    </p>
    <div class="mx-auto mt-8 max-w-3xl space-y-6 text-left text-base leading-8 text-steel">
      @for (line of bullets; track line) {
        <p>{{ line }}</p>
      }
    </div>
  </div>
</section>
