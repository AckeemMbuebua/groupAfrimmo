<section id="realisations" class="px-4 py-20 sm:px-6 lg:px-8 lg:py-28">
  <div class="mx-auto max-w-7xl">
    <div
      appReveal
      class="mb-12 flex flex-col justify-between gap-6 md:flex-row md:items-end"
    >
      <div class="max-w-3xl">
        <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-red-cmt">
          Réalisations
        </p>
        <h2
          class="text-4xl font-extrabold uppercase leading-tight tracking-tight sm:text-5xl"
        >
          Des projets pensés pour durer.
        </h2>
      </div>
      <a
        href="#contact"
        class="inline-flex items-center justify-center gap-3 bg-dark-cmt px-6 py-4 text-xs font-extrabold uppercase tracking-widest text-white transition hover:bg-red-cmt"
      >
        Soumettre un projet
        <i class="fa-solid fa-arrow-right"></i>
      </a>
    </div>

    <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-4">
      @for (project of projects; track project.title) {
        <article
          appReveal
          class="project-card group relative h-[360px] overflow-hidden bg-dark-cmt"
          [ngClass]="{ 'md:col-span-2': project.wide }"
        >
          <img
            [src]="project.imageUrl"
            [alt]="project.imageAlt"
            class="h-full w-full object-cover grayscale"
          />
          <div
            class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"
          ></div>
          <div class="absolute bottom-0 left-0 right-0 p-7 text-white">
            <span
              class="text-[10px] font-extrabold uppercase tracking-[.24em] text-red-cmt"
              >{{ project.category }}</span
            >
            @if (project.description) {
              <h3
                class="mt-3 text-2xl font-extrabold uppercase"
              >
                {{ project.title }}
              </h3>
              <p class="mt-2 text-sm text-white/65">{{ project.description }}</p>
            } @else {
              <h3 class="mt-3 text-xl font-extrabold uppercase">{{ project.title }}</h3>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
