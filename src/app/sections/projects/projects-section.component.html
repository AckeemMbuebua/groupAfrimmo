<section id="realisations" class="scroll-mt-28 px-4 py-20 sm:px-6 lg:px-8 lg:py-28">
  <div class="mx-auto max-w-7xl">
    <div
      appReveal
      class="mb-12 flex flex-col justify-between gap-6 md:flex-row md:items-end"
    >
      <div class="max-w-3xl">
        <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-red-cmt">
          Réalisations
        </p>
        <h2
          class="text-4xl font-extrabold uppercase leading-tight tracking-tight sm:text-5xl"
        >
          Des projets exigeants, du diagnostic à la mise en œuvre.
        </h2>
        <p class="mt-4 max-w-2xl text-sm leading-7 text-steel">
          Aperçu de références terrain du Groupe Afrimmo S.A. (statuts et années indicatifs selon mandat client). Chaque vignette renvoie vers une fiche plus détaillée.
        </p>
        <div class="mt-6 flex flex-wrap gap-4">
          <a
            routerLink="/realisations"
            class="inline-flex items-center gap-2 text-[11px] font-extrabold uppercase tracking-widest text-red-cmt transition hover:text-dark-cmt"
          >
            Toutes nos réalisations
            <i class="fa-solid fa-arrow-right text-xs" aria-hidden="true"></i>
          </a>
          <span class="text-dark-cmt/25" aria-hidden="true">|</span>
          <a
            [href]="phoneHref"
            class="inline-flex items-center gap-2 text-[11px] font-extrabold uppercase tracking-widest text-dark-cmt transition hover:text-red-cmt"
          >
            Brief téléphonique
            <i class="fa-solid fa-phone text-xs" aria-hidden="true"></i>
          </a>
        </div>
      </div>
      <a
        routerLink="/"
        fragment="contact"
        class="inline-flex items-center justify-center gap-3 bg-dark-cmt px-6 py-4 text-xs font-extrabold uppercase tracking-widest text-white transition hover:bg-red-cmt"
      >
        Soumettre un projet
        <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
      </a>
    </div>

    <app-projects-grid
      [projects]="projects"
      projectDetailParent="realisations"
    />
  </div>
</section>
