<section id="realisations" class="scroll-mt-28 px-4 py-20 sm:px-6 lg:px-8 lg:py-28">
  <div class="mx-auto max-w-7xl">
    <div
      appReveal
      class="reveal-readable mb-12 flex flex-col justify-between gap-6 md:flex-row md:items-end"
    >
      <div class="max-w-3xl">
        <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-brand">
          {{ home().projects.eyebrow }}
        </p>
        <h2
          class="text-4xl font-extrabold uppercase leading-tight tracking-tight sm:text-5xl"
        >
          {{ home().projects.title }}
        </h2>
        <p class="mt-4 max-w-2xl text-sm font-light leading-relaxed text-steel">
          {{ home().projects.lead }}
        </p>
        <div class="mt-6 flex flex-wrap items-center gap-4">
          <a
            routerLink="/realisations"
            class="inline-flex items-center gap-2 text-[11px] font-extrabold uppercase tracking-widest text-brand transition hover:text-dark-cmt"
          >
            {{ home().cta.secondary }}
            <i class="fa-solid fa-arrow-right text-xs" aria-hidden="true"></i>
          </a>
          <span class="text-dark-cmt/25" aria-hidden="true">|</span>
          <a
            [href]="phoneHref"
            class="inline-flex items-center gap-2 text-[11px] font-extrabold uppercase tracking-widest text-dark-cmt transition hover:text-brand"
          >
            {{ home().cta.call }}
            <i class="fa-solid fa-phone text-xs" aria-hidden="true"></i>
          </a>
        </div>
      </div>
      <a
        routerLink="/"
        fragment="contact"
        class="inline-flex min-h-[56px] items-center justify-center gap-3 rounded-none bg-brand px-8 py-3 text-xs font-extrabold uppercase tracking-widest text-white transition-colors duration-300 hover:bg-brand-dark"
      >
        {{ home().cta.primary }}
        <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
      </a>
    </div>

    <app-projects-grid
      [projects]="projects()"
      projectDetailParent="realisations"
    />
  </div>
</section>
