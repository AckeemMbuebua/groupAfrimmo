<section id="expertise" class="scroll-mt-28 bg-gray-50 px-4 py-20 sm:px-6 lg:px-8 lg:py-28">
  <div class="mx-auto max-w-7xl">
    <div appReveal class="reveal-readable mb-12 max-w-3xl">
      <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-brand">
        {{ home().expertise.eyebrow }}
      </p>
      <h2
        class="text-4xl font-extrabold uppercase leading-tight tracking-tight sm:text-5xl"
      >
        {{ home().expertise.title }}
      </h2>
      <p class="mt-6 max-w-2xl text-base font-light leading-relaxed text-steel">
        {{ home().expertise.lead }}
      </p>
    </div>

    <div class="grid gap-5 md:grid-cols-3">
      @for (card of home().expertise.cards; track card.title) {
        <div
          appReveal
          class="reveal-readable h-full"
          [style.transition-delay.s]="card.transitionDelaySeconds ?? undefined"
        >
          <article class="magnetic-card h-full overflow-hidden rounded-none border border-gray-200 bg-white">
            <img
              [src]="cardImageSrc(card)"
              [alt]="card.imageAlt"
              width="1000"
              height="640"
              class="h-56 w-full object-cover grayscale"
              referrerpolicy="no-referrer"
              loading="lazy"
              decoding="async"
              (error)="onCardImageError(card.numberLabel)"
            />
            <div class="p-7">
              <span class="text-5xl font-extrabold text-gray-100">{{
                card.numberLabel
              }}</span>
              <h3 class="mt-4 text-lg font-extrabold uppercase leading-tight break-words [overflow-wrap:anywhere] sm:text-xl">{{ card.title }}</h3>
              <p class="mt-4 text-sm font-light leading-relaxed text-steel">
                {{ card.description }}
              </p>
            </div>
          </article>
        </div>
      }
    </div>
  </div>
</section>
