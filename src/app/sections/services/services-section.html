<section
  id="services"
  class="scroll-mt-28 border-t border-dark-cmt/10 bg-surface px-4 py-20 sm:px-6 lg:px-8 lg:py-28"
>
  <div class="mx-auto max-w-7xl">
    <div appReveal class="reveal-readable mb-12 max-w-3xl">
      <p class="mb-4 text-xs font-extrabold uppercase tracking-[.24em] text-brand">
        {{ home().services.eyebrow }}
      </p>
      <h2
        class="text-4xl font-extrabold uppercase leading-tight tracking-tight sm:text-5xl"
      >
        {{ home().services.title }}
      </h2>
      <p class="mt-6 text-base font-light leading-relaxed text-steel">
        {{ home().services.lead }}
      </p>
    </div>

    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (item of home().services.lines; track item.summary; let i = $index) {
        <article
          appReveal
          class="reveal-readable flex gap-5 rounded-none border border-dark-cmt/10 bg-white p-7 transition-colors duration-300 hover:border-brand/30"
          [style.transition-delay.s]="i > 0 ? i * 0.06 : undefined"
        >
          <span
            class="shrink-0 text-3xl font-extrabold leading-none tabular-nums text-brand opacity-90"
          >
            {{ formatOrdinal(i) }}
          </span>
          <p class="text-sm font-extrabold uppercase leading-snug tracking-wide text-dark-cmt">
            {{ item.summary }}
          </p>
        </article>
      }
    </div>
  </div>
</section>
